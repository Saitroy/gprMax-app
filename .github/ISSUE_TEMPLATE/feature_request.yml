name: Feature request
description: Propose a product or workflow improvement
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: input
    id: summary
    attributes:
      label: Short summary
      placeholder: Improve batch-run setup for stepped surveys
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Workflow problem
      description: Describe the current user problem or friction.
    validations:
      required: true
  - type: textarea
    id: users
    attributes:
      label: Who is affected
      description: Which users or scenarios benefit from this?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected behavior or workflow.
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: Current workaround
      description: Describe any current manual or partial workaround.
  - type: textarea
    id: extras
    attributes:
      label: Additional context
      description: Mockups, references, related issues, or technical notes.
